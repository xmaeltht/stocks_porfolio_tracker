<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>maelkloud — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060a12;--surface:rgba(12,18,30,.9);--border:rgba(255,255,255,.08);
  --text:#e8eef8;--muted:#4a5a72;--muted2:#2a3a52;
  --blue:#4f8eff;--blue2:#1d4ed8;--blue-glow:rgba(79,142,255,.2);
  --green:#22c55e;--red:#f43f5e;
}
html{min-height:100%;overflow-y:auto;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;overflow-x:hidden;overflow-y:auto;
}

/* ── Full-screen animated background ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-canvas{width:100%;height:100%;}

/* Gradient blobs */
.blob{position:absolute;border-radius:50%;filter:blur(100px);animation:blob-drift 20s ease-in-out infinite;}
.blob.b1{width:700px;height:700px;background:radial-gradient(circle,rgba(37,99,235,.35),transparent 70%);top:-200px;left:-200px;animation-delay:0s;}
.blob.b2{width:550px;height:550px;background:radial-gradient(circle,rgba(109,40,217,.28),transparent 70%);bottom:-150px;right:-100px;animation-delay:-7s;}
.blob.b3{width:400px;height:400px;background:radial-gradient(circle,rgba(8,145,178,.2),transparent 70%);top:50%;left:55%;animation-delay:-14s;}
@keyframes blob-drift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-30px) scale(1.06);}
  66%{transform:translate(-25px,25px) scale(.95);}
}

/* Grid overlay */
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(79,142,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,142,255,.03) 1px,transparent 1px);
  background-size:48px 48px;
}

/* Animated chart lines in background */
.bg-chart{position:absolute;inset:0;opacity:.07;}
.bg-chart svg{width:100%;height:100%;}

/* ── Page layout ── */
.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  width:100%;
  padding:max(24px, env(safe-area-inset-top,24px)) 16px calc(56px + env(safe-area-inset-bottom,0px));
  min-height:100vh;justify-content:center;gap:0;
}

/* ── Logo ── */
.logo{display:flex;align-items:center;gap:11px;margin-bottom:28px;}
.logo-icon{
  width:46px;height:46px;border-radius:13px;
  background:linear-gradient(135deg,var(--blue2),var(--blue));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(79,142,255,.4),0 6px 28px rgba(79,142,255,.35);
}
.logo-icon svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo-name{font-size:1.65rem;font-weight:800;letter-spacing:-.05em;}
.logo-name span{color:var(--blue);}

/* ── Tagline ── */
.tagline{
  font-size:1.05rem;color:var(--muted);margin-bottom:30px;
  text-align:center;letter-spacing:.01em;
}
.tagline strong{color:rgba(200,215,240,.7);font-weight:600;}

/* ── Auth card ── */
.card{
  width:100%;max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px;
  backdrop-filter:blur(28px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04),
    0 20px 60px rgba(0,0,0,.6),
    0 0 80px rgba(79,142,255,.06);
}

/* ── Tabs ── */
.tabs{
  display:flex;background:rgba(0,0,0,.35);
  border:1px solid var(--border);border-radius:11px;
  padding:3px;margin-bottom:26px;gap:3px;
}
.tab{
  flex:1;padding:9px;border:none;background:transparent;
  color:var(--muted);font-size:.85rem;font-weight:600;
  border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit;
}
.tab.active{
  background:rgba(79,142,255,.12);color:var(--text);
  border:1px solid rgba(79,142,255,.25);
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.tab:hover:not(.active){color:rgba(200,215,240,.6);}

/* ── Form fields ── */
.form-group{margin-bottom:16px;}
.form-group label{
  display:block;font-size:.7rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;
}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;display:flex;align-items:center;
}
.input-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.form-group input{
  width:100%;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  padding:11px 38px;
  font-size:.9rem;outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  font-family:inherit;
}
.form-group input:focus{
  border-color:rgba(79,142,255,.5);
  box-shadow:0 0 0 3px var(--blue-glow);
  background:rgba(79,142,255,.04);
}
.form-group input::placeholder{color:var(--muted);}
.pw-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:3px;display:flex;align-items:center;transition:color .15s;
}
.pw-btn:hover{color:var(--text);}
.pw-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.hint{font-size:.69rem;color:var(--muted);margin-top:5px;}

/* ── Submit ── */
.btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--blue2) 0%,var(--blue) 100%);
  color:#fff;border:none;border-radius:10px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  transition:all .2s;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:inherit;
  box-shadow:0 4px 20px rgba(79,142,255,.35);
  letter-spacing:.01em;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(79,142,255,.45);}
.btn:active{transform:scale(.98)translateY(0);}
.btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ── Error ── */
.error-box{
  background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.35);
  border-radius:9px;padding:10px 13px;margin-bottom:18px;
  font-size:.82rem;color:var(--red);display:none;
  align-items:center;gap:7px;
  animation:shake .3s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.error-box svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;}

/* ── Footer ── */
.card-footer{margin-top:20px;text-align:center;font-size:.7rem;color:var(--muted);}

/* ── Feature chips ── */
.chips{
  display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;margin-top:24px;
}
.chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:20px;padding:6px 13px;
  font-size:.74rem;color:rgba(180,200,230,.7);
  backdrop-filter:blur(10px);
  transition:border-color .2s,background .2s;
}
.chip:hover{border-color:rgba(79,142,255,.3);background:rgba(79,142,255,.06);}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.cd-live{background:var(--green);box-shadow:0 0 6px var(--green);}
.cd-blue{background:var(--blue);}
.cd-purple{background:#a78bfa;}
.cd-yellow{background:#f59e0b;}
.cd-teal{background:#14b8a6;}

/* ── Ticker tape ── */
.ticker-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(6,10,18,.85);border-top:1px solid var(--border);
  backdrop-filter:blur(12px);overflow:hidden;
  padding:0 0 env(safe-area-inset-bottom,0);
}
.ticker-inner{display:flex;animation:ticker-scroll 32s linear infinite;width:max-content;}
.ticker-wrap:hover .ticker-inner{animation-play-state:paused;}
.ticker-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;border-right:1px solid var(--border);
  white-space:nowrap;font-size:.75rem;
}
.t-sym{font-weight:800;font-family:monospace;color:var(--blue);}
.t-val{font-weight:700;}
.t-up{color:var(--green);}
.t-dn{color:var(--red);}
@keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* ── Animations ── */
.card{animation:card-in .5s cubic-bezier(.16,1,.3,1) both;}
.logo{animation:fade-up .4s cubic-bezier(.16,1,.3,1) .1s both;}
.tagline{animation:fade-up .4s cubic-bezier(.16,1,.3,1) .18s both;}
.chips{animation:fade-up .4s cubic-bezier(.16,1,.3,1) .3s both;}
@keyframes card-in{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}
@keyframes fade-up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

/* Landscape / short screens */
@media(max-height:700px){
  .tagline{display:none;}
  .card{padding:24px;}
  .chips{display:none;}
  .logo{margin-bottom:16px;}
}
@media(max-height:580px){
  .logo{margin-bottom:10px;}
  .card{padding:18px 20px;}
  .form-group{margin-bottom:10px;}
}

/* Small phones */
@media(max-width:480px){
  .card{border-radius:16px;padding:24px 18px;}
  .logo-name{font-size:1.45rem;}
  .tagline{font-size:.92rem;padding:0 8px;}
  .chips{gap:6px;}
  .chip{font-size:.7rem;padding:5px 10px;}
  /* Reduce blob size for perf */
  .blob.b1{width:400px;height:400px;}
  .blob.b2{width:320px;height:320px;}
  .blob.b3{width:250px;height:250px;}
}

/* Tiny phones (iPhone SE, old Android) */
@media(max-width:375px){
  .card{padding:20px 16px;}
  .logo-icon{width:40px;height:40px;border-radius:11px;}
  .logo-name{font-size:1.35rem;}
  .tagline{display:none;}
  .tab{padding:8px;}
}

/* Safe area for notched/island iPhones */
@supports(padding:env(safe-area-inset-bottom)){
  .ticker-wrap{padding-bottom:env(safe-area-inset-bottom);}
}
</style>
</head>
<body>

<!-- ── Full-screen background ── -->
<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="bg-grid"></div>
  <!-- Decorative chart lines -->
  <div class="bg-chart">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <polyline points="0,600 120,540 240,580 360,460 480,490 600,380 720,420 840,310 960,350 1080,260 1200,300 1320,220 1440,250" fill="none" stroke="#4f8eff" stroke-width="2"/>
      <polyline points="0,680 120,650 240,665 360,610 480,630 600,575 720,595 840,545 960,560 1080,510 1200,530 1320,490 1440,505" fill="none" stroke="#22c55e" stroke-width="1.5" opacity=".7"/>
      <polyline points="0,720 180,700 360,710 540,680 720,690 900,665 1080,672 1260,650 1440,658" fill="none" stroke="#a78bfa" stroke-width="1" opacity=".5"/>
      <!-- Dot markers on blue line -->
      <circle cx="600" cy="380" r="4" fill="#4f8eff" opacity=".8"/>
      <circle cx="840" cy="310" r="4" fill="#4f8eff" opacity=".8"/>
      <circle cx="1080" cy="260" r="4" fill="#4f8eff" opacity=".8"/>
      <circle cx="1320" cy="220" r="4" fill="#4f8eff" opacity=".8"/>
    </svg>
  </div>
</div>

<!-- ── Main content ── -->
<div class="page">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
    </div>
    <div class="logo-name">mael<span>kloud</span></div>
  </div>

  <!-- Tagline -->
  <div class="tagline">
    <strong>Your personal stock portfolio</strong> — real-time prices, live market data &amp; deep analysis.
  </div>

  <!-- Auth card -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
      <button class="tab"        id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <div class="error-box" id="error-box">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg"></span>
    </div>

    <!-- SIGN IN -->
    <form id="form-login" method="POST" action="/login" onsubmit="return validate('login')">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input type="text" name="username" id="l-user" placeholder="your username" autocomplete="username" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" name="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="pw-btn" onclick="togglePw('l-pass',this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>

    <!-- CREATE ACCOUNT -->
    <form id="form-register" method="POST" action="/register" onsubmit="return validate('register')" style="display:none">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input type="text" name="username" id="r-user" placeholder="choose a username" autocomplete="username" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" name="password" id="r-pass" placeholder="min. 6 characters" autocomplete="new-password" required/>
          <button type="button" class="pw-btn" onclick="togglePw('r-pass',this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="hint">At least 6 characters</div>
      </div>
      <div class="form-group">
        <label>Email <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <div class="input-wrap">
          <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" name="email" id="r-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>
      <button type="submit" class="btn">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Create Account
      </button>
    </form>

    <div class="card-footer">maelkloud · Data via Yahoo Finance · Not financial advice</div>
  </div>

  <!-- Feature chips -->
  <div class="chips">
    <div class="chip"><div class="chip-dot cd-live"></div>Live market data</div>
    <div class="chip"><div class="chip-dot cd-blue"></div>Portfolio tracking</div>
    <div class="chip"><div class="chip-dot cd-teal"></div>Ex-dividend calendar</div>
    <div class="chip"><div class="chip-dot cd-yellow"></div>Price alerts</div>
    <div class="chip"><div class="chip-dot cd-purple"></div>Deep analysis</div>
    <div class="chip"><div class="chip-dot" style="background:#f97316"></div>100% free</div>
  </div>

</div>

<!-- ── Ticker tape ── -->
<div class="ticker-wrap">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<script>
// ── Tab switch ──────────────────────────────────────────────────
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('form-login').style.display    = isLogin ? '' : 'none';
  document.getElementById('form-register').style.display = isLogin ? 'none' : '';
  hideError();
}

// ── Error ───────────────────────────────────────────────────────
function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-msg').textContent = msg;
  box.style.display = 'flex';
  box.style.animation = 'none'; box.offsetHeight; box.style.animation = '';
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

// ── Password toggle ─────────────────────────────────────────────
function togglePw(id, btn) {
  const inp  = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.querySelector('svg').innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

// ── Validation ──────────────────────────────────────────────────
function validate(tab) {
  if (tab === 'login') {
    if (!document.getElementById('l-user').value.trim()) { showError('Please enter your username.'); return false; }
    if (!document.getElementById('l-pass').value)        { showError('Please enter your password.'); return false; }
  } else {
    const u = document.getElementById('r-user').value.trim();
    const p = document.getElementById('r-pass').value;
    if (u.length < 3)              { showError('Username must be at least 3 characters.'); return false; }
    if (p.length < 6)              { showError('Password must be at least 6 characters.'); return false; }
    if (!/^[a-zA-Z0-9_.\-]+$/.test(u)) { showError('Username: letters, numbers, _ . - only'); return false; }
  }
  return true;
}

// ── URL error params ────────────────────────────────────────────
(function() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('tab') === 'register') switchTab('register');
  const msgs = { invalid:'Incorrect username or password.', taken:'That username is already taken.', weak:'Password must be at least 6 characters.' };
  const e = p.get('error');
  if (e && msgs[e]) showError(msgs[e]);
})();

// ── Ticker tape ─────────────────────────────────────────────────
(function() {
  const data = [
    {s:'S&P 500',v:'+0.42%',up:true},{s:'NASDAQ',v:'+0.61%',up:true},
    {s:'DOW',v:'+0.33%',up:true},{s:'VIX',v:'29.83',up:false},
    {s:'BTC',v:'$68,112',up:true},{s:'ETH',v:'$1,979',up:false},
    {s:'AAPL',v:'+0.21%',up:true},{s:'NVDA',v:'-2.53%',up:false},
    {s:'TSLA',v:'-2.03%',up:false},{s:'MSFT',v:'+0.15%',up:true},
    {s:'AMZN',v:'-2.62%',up:false},{s:'META',v:'-2.40%',up:false},
    {s:'GOLD',v:'+0.73%',up:true},{s:'OIL',v:'+13.4%',up:true},
    {s:'JPM',v:'-2.54%',up:false},{s:'XOM',v:'+0.31%',up:true},
  ];
  const wrap = document.getElementById('ticker-inner');
  if (!wrap) return;
  [...data,...data].forEach(d => {
    const el = document.createElement('div');
    el.className = 'ticker-item';
    el.innerHTML = `<span class="t-sym">${d.s}</span><span class="t-val ${d.up?'t-up':'t-dn'}">${d.v}</span>`;
    wrap.appendChild(el);
  });
})();
</script>
</body>
</html>
